<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Team Margi — Rutina semanal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --acc:#3DDC97;--acc2:#4FA3D1;--warn:#E8A33D;--danger:#E0556F;
  --bg:#15171F;--card:#1C1F2A;--card2:#22263380;--tx:#EDEEF2;--ts:#8C90A3;--bd:#2C3040;
  --exbg:#1A2B26;--exbd:#2C4A3E;
}
body{font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* HEADER */
.hdr{background:rgba(21,23,31,.95);border-bottom:1px solid var(--bd);padding:12px 12px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.htop{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.brand{flex:1;min-width:0}
.brand h1{font-size:18px;font-weight:900;letter-spacing:-.3px;line-height:1.15}
.brand h1 .accent{color:var(--acc)}
.brand .tagline{font-size:8.5px;color:var(--ts);font-weight:700;letter-spacing:.3px;text-transform:uppercase;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.resetbtn{flex-shrink:0;background:rgba(224,85,111,.12);border:1px solid rgba(224,85,111,.35);color:var(--danger);border-radius:7px;padding:5px 9px;font-size:10px;font-weight:800;cursor:pointer;-webkit-appearance:none}

/* PROGRESS */
.prog-wrap{margin-bottom:10px;background:var(--card);border:1px solid var(--bd);border-radius:9px;padding:7px 11px}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.prog-label{font-size:10px;font-weight:800;color:var(--ts);letter-spacing:.3px;text-transform:uppercase}
.prog-pct{font-size:11px;font-weight:900;color:var(--acc)}
.prog-bar{height:6px;background:var(--bd);border-radius:50px;overflow:hidden}
.prog-fill{height:100%;border-radius:50px;background:var(--acc);transition:width .4s ease}

/* PERSON TABS */
.ptabs{display:flex;gap:7px;margin-bottom:9px}
.ptab{flex:1;padding:8px 4px;border-radius:9px;border:1.5px solid var(--bd);font-size:9.5px;font-weight:800;cursor:pointer;background:var(--card);color:var(--ts);text-align:center;-webkit-appearance:none;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ptab.active{background:var(--acc2);color:#fff;border-color:var(--acc2)}

/* DAY TABS + DAY NOW (todo en el header, compacto) */
.dayrow{margin-bottom:9px}
.dtabs{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:7px}
.dtab{padding:6px 4px;border-radius:8px;border:1.5px solid var(--bd);font-size:10px;font-weight:800;cursor:pointer;background:var(--card);color:var(--ts);white-space:nowrap;-webkit-appearance:none;transition:all .15s;text-align:center}
.dtab.active{background:var(--acc);color:#0D1410;border-color:var(--acc)}
.dtab .dtick{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--acc);margin-left:3px;vertical-align:middle}
.dtab.active .dtick{background:#0D1410}

.dnow{padding:8px 10px;background:var(--card);border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.savebtn{flex-shrink:0;background:rgba(61,220,151,.15);border:1.5px solid var(--acc);color:var(--acc);border-radius:8px;padding:7px 9px;font-size:9.5px;font-weight:800;cursor:pointer;-webkit-appearance:none;white-space:nowrap}
.savebtn:disabled{cursor:default}
.savebtn.saved{background:rgba(140,144,163,.12);border-color:var(--bd);color:var(--ts)}
.lockedbanner{background:rgba(140,144,163,.1);border:1px solid var(--bd);border-radius:9px;padding:8px 10px;font-size:10.5px;color:var(--ts);font-weight:700;margin-bottom:9px;text-align:center}
.dnow-txt{min-width:0}
.dnow-title{font-size:12.5px;font-weight:800;color:var(--tx);line-height:1.3}
.dnow-focus{font-size:9.5px;color:var(--ts);margin-top:1px;font-weight:600}

/* CONTENT */
.content{padding:11px}

/* DAY PROGRESS RING - compacta, integrada en dnow */
.day-prog-ring{position:relative;width:32px;height:32px;flex-shrink:0}
.day-prog-ring svg{width:32px;height:32px;transform:rotate(-90deg)}
.day-prog-ring .ring-bg{fill:none;stroke:var(--bd);stroke-width:4}
.day-prog-ring .ring-fill{fill:none;stroke:var(--acc);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .4s ease}
.day-prog-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8px;font-weight:900;color:var(--acc)}

/* GRID DE ITEMS - 2 columnas compactas para warmup/cooldown */
.itemlist{display:grid;grid-template-columns:1fr 1fr;gap:6px}

/* LISTA DE EJERCICIOS - una sola columna, para que el detalle expandido no deje huecos */
.exlist{display:flex;flex-direction:column;gap:8px}

/* ITEM CARD genérica (warmup/cooldown) - color neutro, compacta */
.item{background:var(--card);border:1.5px solid var(--bd);border-radius:10px;display:flex;align-items:center;gap:6px;padding:7px 8px;transition:all .2s;min-width:0}
.item.done{border-color:var(--acc);background:rgba(61,220,151,.06)}
.item-ico{font-size:14px;flex-shrink:0}
.item-body{flex:1;min-width:0}
.item-name{font-size:10px;font-weight:800;color:var(--tx);line-height:1.25}
.item.done .item-name{color:var(--acc)}
.item-sub{font-size:8.5px;color:var(--ts);line-height:1.3;margin-top:1px;font-weight:600}
.item-chk{flex-shrink:0;width:19px;height:19px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-appearance:none;background:none;transition:all .2s}
.item.done .item-chk{background:var(--acc);border-color:var(--acc)}
.item-chk svg{opacity:0;transition:opacity .2s}
.item.done .item-chk svg{opacity:1}

/* EX CARD - color diferencial verde oscuro para distinguir de warmup/cooldown */
.exc{background:var(--exbg);border:1.5px solid var(--exbd);border-radius:13px;overflow:hidden;transition:all .2s}
.exc.done{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc) inset}

.extop{display:flex;gap:9px;align-items:center;padding:9px 10px}
.exillo{flex-shrink:0;width:54px;height:54px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--bd)}
.exc.done .exillo{border-color:var(--acc)}
.exillo svg{width:46px;height:46px}
.exbody{flex:1;min-width:0}
.exname{font-size:12.5px;font-weight:800;color:var(--tx);line-height:1.3;margin-bottom:4px}
.exc.done .exname{color:var(--acc)}
.badges{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-size:9.5px;padding:2px 6px;border-radius:5px;font-weight:800}
.bs{background:rgba(61,220,151,.15);color:var(--acc)}
.br{background:rgba(79,163,209,.15);color:var(--acc2)}
.bt{background:rgba(140,144,163,.15);color:var(--ts)}

.exrow2{display:flex;border-top:1px solid var(--exbd)}
.expbtn{flex:1;background:none;border:none;border-right:1px solid var(--exbd);padding:7px 10px;text-align:center;font-size:10px;font-weight:800;color:var(--acc2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;-webkit-appearance:none}
.expbtn .arr{transition:transform .25s;font-size:11px}
.expbtn.open .arr{transform:rotate(180deg)}
.chkbtn{flex:1;background:none;border:none;padding:7px 10px;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;-webkit-appearance:none;font-size:10px;font-weight:800}
.chk-circle{width:18px;height:18px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.exc.done .chk-circle{background:var(--acc);border-color:var(--acc)}
.chk-circle svg{opacity:0;transition:opacity .2s}
.exc.done .chk-circle svg{opacity:1}
.chk-txt{color:var(--ts)}
.exc.done .chk-txt{color:var(--acc)}

.exdet{display:none;padding:0 12px 11px;border-top:1px solid var(--exbd)}
.exdet.open{display:block;padding-top:9px}
.dsec{margin-bottom:9px}
.dlabel{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--acc2);margin-bottom:3px}
.dtext{font-size:11.5px;color:var(--ts);line-height:1.5;font-weight:600}
.dsteps{list-style:none;padding:0}
.dsteps li{font-size:11.5px;color:var(--ts);line-height:1.5;padding:4px 0 4px 18px;position:relative;border-bottom:1px solid var(--exbd);font-weight:600}
.dsteps li:last-child{border-bottom:none}
.dsteps li::before{content:attr(data-n);position:absolute;left:0;font-weight:900;color:var(--acc2);font-size:10px}
.tipbox{background:rgba(232,163,61,.1);border:1px solid rgba(232,163,61,.3);border-radius:8px;padding:8px 10px;font-size:11.5px;color:var(--warn);line-height:1.5;font-weight:600}

.footer{text-align:center;padding:16px;font-size:10px;color:var(--ts);line-height:1.7;font-weight:600}

/* MODAL RESUMEN */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--card);border-top:1px solid var(--bd);border-radius:18px 18px 0 0;padding:16px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.modal-hdr h2{font-size:15px;font-weight:800}
.modal-close{background:var(--bd);border:none;color:var(--tx);width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;-webkit-appearance:none}
.modal-box{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px;font-size:12px;line-height:1.7;white-space:pre-wrap;font-family:inherit;color:var(--tx);font-weight:600;max-height:45vh;overflow-y:auto}
.modal-copybtn{width:100%;margin-top:10px;padding:11px;border-radius:10px;border:none;background:var(--acc);color:#0D1410;font-weight:800;font-size:13px;cursor:pointer;-webkit-appearance:none}
.modal-copybtn.copied{background:var(--acc2)}
</style>
</head>
<body>
<div class="hdr">
  <div class="htop">
    <div class="brand">
      <h1>🔥 TEAM <span class="accent">MARGI</span></h1>
      <div class="tagline">Ejercicio y disciplina en casa</div>
    </div>
    <button class="resetbtn" onclick="resetSemana()" title="Reiniciar semana">↺ Reset</button>
    <button class="resetbtn" style="background:rgba(79,163,209,.12);border-color:rgba(79,163,209,.35);color:var(--acc2)" onclick="showResumen()" title="Ver resumen">📊 Resumen</button>
  </div>
  <div class="prog-wrap">
    <div class="prog-row">
      <span class="prog-label" id="wpLabel">Progreso semanal</span>
      <span class="prog-pct" id="wpPct">0%</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="wpFill" style="width:0%"></div></div>
  </div>
  <div class="ptabs">
    <button class="ptab active" onclick="setPerson('yo')">🧑 Juan Martín — Man</button>
    <button class="ptab" onclick="setPerson('pareja')">👩 Estefanía Giraldo — Woman</button>
  </div>
  <div class="dayrow">
    <div class="dtabs" id="dayTabs"></div>
    <div class="dnow" id="dayNow">
      <div class="dnow-txt"><div class="dnow-title" id="dnowTitle"></div><div class="dnow-focus" id="dnowFocus"></div></div>
      <div class="day-prog-ring">
        <svg viewBox="0 0 38 38">
          <circle class="ring-bg" cx="19" cy="19" r="16"/>
          <circle class="ring-fill" id="dpRingFill" cx="19" cy="19" r="16"/>
        </svg>
        <span class="day-prog-pct" id="dpPct">0%</span>
      </div>
      <button class="savebtn" id="saveDayBtn" onclick="guardarDia()">💾 Guardar</button>
    </div>
  </div>
</div>

<div class="content" id="content"></div>
<div class="footer">Descansa sáb y dom · 7-8h de sueño · Hidratación constante</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeResumen()">
  <div class="modal">
    <div class="modal-hdr"><h2>📊 Mi resumen</h2><button class="modal-close" onclick="closeResumen()">✕</button></div>
    <div class="modal-box" id="resumenBox">Cargando...</div>
    <button class="modal-copybtn" id="copyBtn" onclick="copyResumen()">Copiar texto</button>
  </div>
</div>

const EX={
sentadilla_smith:{desc:"El ejercicio más importante para piernas. Trabaja muslos y glúteos a la vez.",pos:"Párate debajo de la barra de la máquina Smith, de espaldas a ella. Apoya la barra sobre la parte alta de tu espalda (donde nacen los hombros, no en el cuello). Pies al ancho de tus hombros, un pasito adelante de la barra. Gira las manijas para destrabarla antes de empezar.",pasos:["Baja como si te fueras a sentar en una silla, sacando un poco la cadera hacia atrás.","Baja hasta que tus muslos queden paralelos al piso (o hasta donde te sientas cómodo si recién empiezas).","Sube empujando con los talones, sin estirar las rodillas de golpe."],tip:"La Smith ya guía el movimiento hacia arriba y abajo, así que no te vas a caer. Concéntrate solo en bajar controlado."},
peso_muerto:{desc:"Fortalece toda la espalda baja, glúteos y piernas. Muy completo, pero hay que cuidar la postura.",pos:"De pie frente a la barra (en el piso), pies al ancho de tus caderas. Agáchate doblando rodillas y cadera, agarra la barra con las dos manos justo afuera de tus piernas, palmas hacia ti.",pasos:["Antes de levantar, mete el pecho hacia adelante y endereza la espalda (no la dejes encorvada).","Levanta la barra pegada a tus piernas, empujando el piso con los pies, como si te pararas con fuerza.","Termina de pie, parado derecho, apretando los glúteos arriba."],tip:"Lo más importante: la espalda baja nunca se debe redondear como una C. Si sientes que se dobla, usa menos peso."},
extension_cuad:{desc:"Ejercicio simple en máquina para fortalecer la parte de adelante del muslo (cuádriceps).",pos:"Siéntate en la máquina de extensión, con la espalda apoyada en el respaldo. Engancha tus tobillos detrás del cojín acolchado que cuelga abajo. Ajusta el respaldo si hace falta para que tus rodillas queden justo en el borde del asiento.",pasos:["Estira las dos piernas hacia adelante hasta que queden casi rectas.","Aguanta 1 segundo arriba, sintiendo el muslo apretado.","Baja despacio, sin dejar caer el peso de golpe."],tip:"Bajar lento es lo que más trabaja el músculo. No tengas afán en esa parte."},
intervalos_caminadora:{desc:"Cardio que alterna momentos rápidos y lentos. Ideal para mejorar tu aguante en la cancha.",pos:"Súbete a la caminadora, presiona Start/Inicio y empieza con velocidad baja para entrar en calor. Mantente erguido, mirando al frente (no hacia abajo).",pasos:["3 min caminando suave (puedes hablar sin problema) para entrar en calor.","Sube la velocidad 1 minuto (vas a respirar fuerte), luego bájala 1 minuto para descansar. Repite esto varias veces.","Termina con 3 min caminando suave para bajar el ritmo cardiaco."],tip:"Si en el minuto rápido no puedes ni hablar una palabra, vas en el ritmo correcto."},
prensa_pecho:{desc:"Ejercicio de empuje para fortalecer el pecho, usando la multiestación.",pos:"Siéntate en el asiento de la multiestación, espalda bien pegada al respaldo. Agarra las dos manijas que quedan a la altura de tu pecho, con las palmas mirando hacia adelante.",pasos:["Empuja las manijas hacia adelante hasta que tus brazos queden casi estirados (sin trabar los codos).","Regresa despacio, sintiendo cómo se estira el pecho, sin soltar de golpe."],tip:"Imagina que quieres juntar tus manos al empujar: eso ayuda a sentir bien el pecho trabajando."},
press_hombros_mancuerna:{desc:"Fortalece los hombros. Se hace sentado o de pie, con una mancuerna en cada mano.",pos:"Siéntate en un banco (o quédate de pie si no hay), sube las mancuernas hasta la altura de tus orejas, con los codos doblados apuntando hacia los lados, palmas mirando hacia adelante.",pasos:["Empuja las dos mancuernas hacia arriba al mismo tiempo, hasta casi juntarlas sobre tu cabeza.","Baja despacio y controlado, hasta volver a la posición de inicio (codos a la altura de las orejas)."],tip:"Si arqueas mucho la espalda baja al subir el peso, significa que está muy pesado. Baja un poco la carga."},
fondos_barra:{desc:"Ejercicio con tu propio peso para fortalecer pecho y brazos, usando la barra colgada del techo o soporte.",pos:"Sujétate de la barra con las dos manos, brazos completamente estirados, cuerpo colgando recto en el aire (puedes cruzar los pies atrás si te ayuda al equilibrio).",pasos:["Baja tu cuerpo doblando los codos, hasta sentir un buen estiramiento en el pecho.","Empuja hacia arriba volviendo a estirar los brazos, sin rebotar."],tip:"Si no logras hacer muchas, no pasa nada: baja menos al inicio (un rango más corto) e ir mejorando poco a poco cada semana."},
plancha_abdominal:{desc:"Ejercicio de aguante para fortalecer el abdomen. No te mueves, solo sostienes la posición un tiempo.",pos:"Acuéstate boca abajo sobre una colchoneta. Apóyate en tus antebrazos (codos justo bajo los hombros) y en las puntas de los pies. Levanta el cuerpo del piso, quedando recto como una tabla, sin que la cadera suba ni baje.",pasos:["Aprieta el abdomen y los glúteos con fuerza.","Aguanta el tiempo indicado, respirando normal (no aguantes el aire).","Si sientes que la cadera se cae o sube mucho, termina ahí la serie."],tip:"Mejor aguantar 30 segundos con buena postura que 60 segundos con la cadera caída."},
bicicleta_intervalos:{desc:"Cardio suave para las articulaciones. Ayuda a quemar grasa sin golpear las rodillas.",pos:"Súbete a la bicicleta spinning, ajusta la altura del asiento de forma que tu pierna quede casi estirada al pedalear hacia abajo (no completamente recta).",pasos:["Pedalea suave los primeros 5 min para calentar las piernas.","Alterna 1 minuto pedaleando fuerte (subiendo la resistencia) y 1 minuto suave. Repite varias veces.","Termina pedaleando suave para bajar el ritmo."],tip:"No hace falta ir al máximo todo el tiempo: el truco está en alternar entre fuerte y suave."},
caminadora_inclinada:{desc:"Caminar con la caminadora inclinada (como subir una loma). Quema más calorías que caminar plano y trabaja bien las piernas y glúteos.",pos:"Súbete a la caminadora. Busca el botón de inclinación (incline) y súbelo poco a poco. No te agarres de las barras mientras caminas, eso le quita efecto al ejercicio.",pasos:["Camina 2 min sin inclinación para entrar en calor.","Sube la inclinación y mantén un paso firme, sin correr.","Si sientes que necesitas agarrarte de las barras, baja un poco la inclinación."],tip:"Caminar inclinado trabaja mucho los glúteos, sin el golpe que tiene correr."},
remo_polea:{desc:"Ejercicio de jalón en la multiestación, para fortalecer toda la espalda.",pos:"Siéntate frente a la polea baja, con los pies apoyados en la plataforma de enfrente y las rodillas un poco dobladas. Agarra el mango con las dos manos, brazos estirados hacia adelante.",pasos:["Tira del mango hacia tu abdomen (no hacia el pecho), llevando los codos hacia atrás, pegados al cuerpo.","Aprieta la espalda (como si juntaras los omóplatos) por 1 segundo.","Regresa despacio, estirando los brazos de nuevo hacia adelante."],tip:"Piensa en jalar con los codos, no solo con las manos: así trabaja mejor la espalda y menos el brazo."},
remo_inclinado_barra:{desc:"Ejercicio con barra libre para fortalecer la espalda completa. Un poco más exigente que el de polea.",pos:"De pie, sujeta la barra del piso con las dos manos (un poco más separadas que tus hombros). Inclina el torso hacia adelante, casi a 45 grados, con la espalda recta (no encorvada) y deja que la barra cuelgue frente a tus piernas.",pasos:["Tira la barra hacia tu abdomen, llevando los codos hacia atrás.","Aprieta la espalda arriba por 1 segundo.","Baja despacio hasta estirar los brazos de nuevo."],tip:"Si tu cuerpo se balancea mucho de arriba a abajo para ayudarte a subir la barra, el peso está muy alto."},
curl_bicep:{desc:"El clásico ejercicio para fortalecer los brazos (bíceps).",pos:"De pie, con una mancuerna en cada mano, brazos estirados hacia abajo a los lados de tu cuerpo, codos pegados a las costillas.",pasos:["Sube la mancuerna doblando solo el codo (el hombro y el brazo no se mueven, solo el antebrazo).","Aprieta arriba por 1 segundo, sintiendo el músculo del brazo.","Baja despacio hasta estirar el brazo de nuevo."],tip:"Si tu cuerpo se balancea para ayudarte a subir el peso, significa que está muy pesado. Baja la carga."},
peso_muerto_rumano:{desc:"Variante del peso muerto que se enfoca más en la parte de atrás de las piernas (isquiotibiales).",pos:"De pie, sujetando la barra con las dos manos frente a tus muslos. Las rodillas casi rectas, con una leve flexión (no completamente trabadas).",pasos:["Empuja tu cadera hacia atrás mientras bajas la barra pegada a tus piernas, manteniendo la espalda recta.","Vas a sentir que se estira la parte de atrás del muslo: es normal y es justo lo que buscamos.","Sube empujando la cadera hacia adelante de nuevo, hasta quedar de pie."],tip:"Si sientes dolor en la espalda baja en vez de un estiramiento en la pierna, probablemente estás doblando mucho la espalda: enderézala."},
press_hombros_smith:{desc:"Ejercicio para fortalecer hombros, usando la máquina Smith (la barra que se mueve solo hacia arriba y abajo, guiada por dos rieles).",pos:"Coloca un banco justo debajo de la barra de la Smith (o siéntate si la máquina tiene asiento incorporado). Ajusta la altura del banco o de la barra para que, sentado, la barra quede a la altura de tu barbilla. Agarra la barra con las dos manos, un poco más separadas que tus hombros, palmas hacia adelante. Gira las manijas para destrabarla.",pasos:["Empuja la barra hacia arriba, en línea recta, hasta casi estirar los brazos sobre tu cabeza.","Baja despacio y controlado, hasta que la barra vuelva a quedar cerca de tu barbilla."],tip:"Como la Smith ya guía el recorrido de la barra (no se puede ir de lado a lado), no te tienes que preocupar por el equilibrio: solo enfócate en empujar parejo con los dos brazos."},
zancadas_mancuerna:{desc:"Ejercicio que trabaja una pierna a la vez. Bueno para piernas, glúteos y equilibrio.",pos:"De pie, con una mancuerna en cada mano, brazos a los lados, pies juntos.",pasos:["Da un paso largo hacia adelante con una pierna.","Baja el cuerpo doblando ambas rodillas, hasta que la rodilla de atrás casi toque el piso.","Empuja con el pie de adelante para volver a la posición inicial, de pie."],tip:"Si la rodilla de adelante se mete hacia adentro al bajar, hazlo con menos peso (o sin peso) hasta dominar el movimiento."},
carrera_continua:{desc:"Trotar a un ritmo parejo, sin parar. Mejora tu resistencia general para el fútbol.",pos:"Súbete a la caminadora, postura relajada, brazos moviéndose de forma natural a los lados (no cruzados ni tensos).",pasos:["3 min caminando rápido para entrar en calor.","Sube el ritmo a un trote constante y mantenlo parejo, sin acelerar ni frenar de golpe.","Termina bajando la velocidad poco a poco hasta quedar caminando suave."],tip:"Si puedes hablar con frases cortas pero te cuesta un poco de aire, vas en el ritmo justo."},
glute_bridge:{desc:"Ejercicio básico y muy efectivo para activar los glúteos. Ideal para empezar a fortalecer esa zona.",pos:"Acuéstate boca arriba sobre una colchoneta, rodillas dobladas, pies apoyados en el piso cerca de tus glúteos, brazos a los lados.",pasos:["Aprieta los glúteos y sube la cadera hacia el techo, hasta que tu cuerpo forme una línea recta de hombros a rodillas.","Aguanta 1-2 segundos arriba, apretando bien.","Baja despacio, sin dejar caer la cadera de golpe."],tip:"Si sientes más esfuerzo en la parte de atrás del muslo que en el glúteo, acerca un poco más los pies hacia tu cuerpo."},
hip_thrust_mancuerna:{desc:"Versión con peso del glute bridge. Uno de los mejores ejercicios que existen para tonificar los glúteos.",pos:"Siéntate en el piso con la espalda apoyada contra el borde de un banco (a la altura de tus omóplatos). Coloca una mancuerna sobre tus caderas (puedes poner una toalla doblada debajo para que no incomode), sujétala con las dos manos.",pasos:["Baja la cadera casi hasta tocar el piso.","Sube con fuerza empujando con los talones, apretando los glúteos al llegar arriba.","Aguanta 1-2 segundos arriba, bien apretado."],tip:"Apunta las puntas de tus pies un poco hacia afuera: eso ayuda a sentir más el glúteo trabajando."},
sentadilla_mancuerna:{desc:"Sentadilla con mancuernas. Más fácil de aprender que con barra, ideal si recién empiezas.",pos:"De pie, con una mancuerna en cada mano a los lados de tu cuerpo, o sosteniendo una sola mancuerna pegada al pecho con las dos manos.",pasos:["Baja como si te fueras a sentar en una silla.","Baja hasta que tus muslos queden paralelos al piso (o hasta donde te sientas cómodo).","Sube empujando con los talones."],tip:"Si tus talones se levantan del piso al bajar, es normal al principio. Mejora con la práctica y la flexibilidad de tobillo."},
zancadas_sin_peso:{desc:"Igual que las zancadas normales, pero sin cargar peso. Perfecto para aprender el movimiento primero.",pos:"De pie, pies juntos, manos en la cintura.",pasos:["Da un paso largo hacia adelante con una pierna.","Baja el cuerpo hasta que la rodilla de atrás casi toque el piso.","Empuja con el pie de adelante para volver a quedar de pie."],tip:"Practica frente a un espejo para revisar que tu cuerpo no se incline mucho hacia adelante."},
bicicleta_suave:{desc:"Cardio muy suave, ideal para retomar el ejercicio sin exigir de más al cuerpo.",pos:"Súbete a la bicicleta spinning, ajusta el asiento a una altura cómoda donde tu pierna quede casi estirada al pedalear.",pasos:["Pedalea muy suave los primeros 3 minutos.","Sube un poco el ritmo, a uno donde puedas seguir hablando con normalidad.","Termina pedaleando suave de nuevo."],tip:"Si puedes hablar sin problema pero no podrías cantar una canción, ese es tu ritmo ideal."},
plancha_rodillas:{desc:"Versión más fácil de la plancha, apoyando las rodillas en vez de los pies. Perfecta para empezar.",pos:"Sobre una colchoneta, apóyate en tus antebrazos (codos bajo los hombros) y en las rodillas (no en los pies). Levanta la cadera del piso, quedando el cuerpo recto desde la cabeza hasta las rodillas.",pasos:["Aprieta el abdomen suavemente.","Mantén la cadera ni muy alta ni muy hundida, en línea con el resto del cuerpo.","Respira de forma normal todo el tiempo."],tip:"Cuando puedas aguantar 45 segundos sin esfuerzo, prueba la plancha completa apoyando los pies."},
plancha_completa:{desc:"La plancha completa, apoyando los pies en vez de las rodillas. Más exigente que la versión anterior.",pos:"Sobre una colchoneta, antebrazos en el piso (codos bajo los hombros), puntas de los pies apoyadas. Cuerpo bien recto, como una tabla, de la cabeza a los talones.",pasos:["Aprieta abdomen y glúteos al mismo tiempo.","Mantén la cabeza mirando hacia el piso, alineada con tu espalda (no la levantes para mirar al frente).","Para la serie en cuanto sientas que la cadera empieza a caer."],tip:"Suma 5 segundos cada semana. Poco a poco vas a poder aguantar mucho más tiempo."},
glute_bridge_pausa:{desc:"El mismo glute bridge, pero aguantando más tiempo arriba para sentir más el glúteo trabajando.",pos:"Igual que el glute bridge normal: acostado boca arriba, rodillas dobladas, pies apoyados cerca de tus glúteos.",pasos:["Sube la cadera apretando fuerte el glúteo.","Aguanta 2 segundos arriba, bien apretado, sin relajar.","Baja muy despacio, contando hasta 3 o 4."],tip:"Cuando se sienta fácil, puedes sostener una mancuerna sobre la cadera para sumar más reto."},
hip_thrust_barra:{desc:"Hip thrust con barra libre. Permite usar más peso que con mancuerna, para seguir progresando cuando ya domines el movimiento.",pos:"Espalda apoyada contra el borde de un banco (altura de los omóplatos). Coloca la barra sobre tus caderas, con una toalla o cojín debajo para que no incomode.",pasos:["Baja la cadera casi hasta tocar el piso.","Sube con fuerza, empujando con los talones y apretando los glúteos.","Baja controlado, sin dejar caer el peso de golpe."],tip:"Tus pies deben quedar lo bastante lejos del banco para que, arriba del todo, tus piernas queden verticales (en ángulo recto)."},
sentadilla_sumo:{desc:"Sentadilla con los pies bien abiertos. Trabaja más la cara interna de la pierna y el glúteo.",pos:"Pies bien abiertos, más separados que tus hombros, puntas apuntando hacia afuera. Sostén una mancuerna con las dos manos, colgando entre tus piernas.",pasos:["Baja doblando las rodillas en la misma dirección hacia donde apuntan tus pies.","Baja hasta que tus muslos queden paralelos al piso.","Sube apretando los glúteos al llegar arriba."],tip:"Si tus rodillas se cierran hacia adentro al bajar, usa menos peso por ahora hasta ganar más control."},
caminadora_larga:{desc:"Caminata larga con inclinación. El ejercicio que más ayuda a quemar grasa de toda la semana.",pos:"Súbete a la caminadora, ajusta la inclinación igual que en el ejercicio de caminadora inclinada, pero esta vez vas a mantenerla por más tiempo.",pasos:["3 min sin inclinación para entrar en calor.","Sube la inclinación poco a poco hasta un nivel donde sientas esfuerzo pero puedas mantenerlo.","Mantén ese ritmo el resto del tiempo, sin bajar la inclinación.","Termina el último minuto caminando muy suave, sin inclinación."],tip:"20 minutos así queman calorías parecido a correr 15 minutos, pero sin tanto golpe en tus rodillas."},

// Estado con persistencia localStorage. Estructura: {warmup:[bool], cooldown:[bool], ex:[bool]}
let person='yo', day=0, openDet=new Set();
function emptyDoneDay(){return {warmup:[],cooldown:[],ex:[]}}
function emptyDonePerson(){return Array.from({length:5},emptyDoneDay)}
function loadDone(){
  try{
    const s=localStorage.getItem('gym_done_v2');
    if(s)return JSON.parse(s);
  }catch(e){}
  return {yo:emptyDonePerson(),pareja:emptyDonePerson()};
}
function saveDone(){try{localStorage.setItem('gym_done_v2',JSON.stringify(done));}catch(e){}}
const done=loadDone();

// ---- LOG HISTÓRICO (independiente por dispositivo) ----
// Estructura: { "yo": { "2026-06-19": {done:6, total:10, dayName:"Viernes"} }, "pareja": {...} }
function loadLog(){
  try{const s=localStorage.getItem('gym_log_v1');if(s)return JSON.parse(s);}catch(e){}
  return {yo:{},pareja:{}};
}
function saveLog(){try{localStorage.setItem('gym_log_v1',JSON.stringify(log));}catch(e){}}
const log=loadLog();
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// ---- GUARDADO MANUAL: qué días de ESTA semana visible ya fueron guardados ----
// Estructura: { "yo": [false,false,false,false,false], "pareja": [...] }  (índice = día 0-4)
function loadSaved(){
  try{const s=localStorage.getItem('gym_saved_days_v1');if(s)return JSON.parse(s);}catch(e){}
  return {yo:[false,false,false,false,false],pareja:[false,false,false,false,false]};
}
function saveSavedFlags(){try{localStorage.setItem('gym_saved_days_v1',JSON.stringify(savedDays));}catch(e){}}
const savedDays=loadSaved();
function isDaySaved(p,d){return !!(savedDays[p]&&savedDays[p][d]);}

// ---- BLOQUEO POR FECHA REAL ----
// Solo el día de la semana que coincide con "hoy" puede editarse. Lun=0 ... Vie=4. Sáb/Dom no editan nada.
function todayDayIndex(){
  const js=new Date().getDay(); // 0=domingo,1=lunes,...,6=sábado
  if(js===0||js===6)return -1; // fin de semana: ningún día de rutina es "hoy"
  return js-1; // lunes(1)->0 ... viernes(5)->4
}
function isToday(d){return d===todayDayIndex();}
// Un día se puede editar SOLO si es el día real de hoy Y aún no fue guardado
function isDayEditable(p,d){return isToday(d)&&!isDaySaved(p,d);}
// Un día aparece bloqueado (candado) si ya fue guardado, o si no es el día de hoy
function isDayLocked(p,d){return isDaySaved(p,d)||!isToday(d);}

function guardarDia(){
  if(!isToday(day)){
    alert('Solo puedes guardar el día de hoy.');
    return;
  }
  if(isDaySaved(person,day)){
    alert('Este día ya fue guardado. Si quieres corregirlo, primero presiona Reset semanal.');
    return;
  }
  const td=totalDayItems(person,day), dn=doneDayItems(person,day);
  if(!log[person])log[person]={};
  log[person][todayKey()]={done:dn,total:td,dayName:dayData(person,day).name};
  saveLog();
  if(!savedDays[person])savedDays[person]=[false,false,false,false,false];
  savedDays[person][day]=true;
  saveSavedFlags();
  renderDayTabs();renderContent();
  alert('✅ Guardado registro semanal\n'+dayData(person,day).name+': '+dn+'/'+td+' completado');
}

function dayData(p,d){return routines[p].days[d]}
function dayDoneObj(p,d){
  if(!done[p][d])done[p][d]=emptyDoneDay();
  const dd=done[p][d], dat=dayData(p,d);
  if(dd.warmup.length!==dat.warmup.length)dd.warmup=dat.warmup.map((_,i)=>!!dd.warmup[i]);
  if(dd.cooldown.length!==dat.cooldown.length)dd.cooldown=dat.cooldown.map((_,i)=>!!dd.cooldown[i]);
  if(dd.ex.length!==dat.exercises.length)dd.ex=dat.exercises.map((_,i)=>!!dd.ex[i]);
  return dd;
}

function totalDayItems(p,d){const dat=dayData(p,d);return dat.warmup.length+dat.cooldown.length+dat.exercises.length}
function doneDayItems(p,d){const dd=dayDoneObj(p,d);return dd.warmup.filter(Boolean).length+dd.cooldown.filter(Boolean).length+dd.ex.filter(Boolean).length}
function totalWeekItems(p){let t=0;routines[p].days.forEach((_,d)=>t+=totalDayItems(p,d));return t}
function doneWeekItems(p){let t=0;routines[p].days.forEach((_,d)=>t+=doneDayItems(p,d));return t}
function pct(a,b){return b?Math.round(a/b*100):0}

function updateWeekProg(){
  const tw=totalWeekItems(person), dw=doneWeekItems(person), p=pct(dw,tw);
  document.getElementById('wpPct').textContent=p+'%';
  document.getElementById('wpFill').style.width=p+'%';
  document.getElementById('wpLabel').textContent='Progreso semanal ('+dw+'/'+tw+')';
}
function updateDayRing(){
  const td=totalDayItems(person,day), dd=doneDayItems(person,day), p=pct(dd,td);
  const el=document.getElementById('dpPct');
  if(el)el.textContent=p+'%';
  const circ=document.getElementById('dpRingFill');
  if(circ){const r=16,circum=2*Math.PI*r;circ.style.strokeDasharray=circum;circ.style.strokeDashoffset=circum*(1-p/100);}
  const dat=dayData(person,day);
  const tEl=document.getElementById('dnowTitle'), fEl=document.getElementById('dnowFocus');
  if(tEl)tEl.textContent=dat.name+' · '+dat.title;
  if(fEl)fEl.textContent=dat.focus;
  updateSaveBtn();
}

function updateSaveBtn(){
  const btn=document.getElementById('saveDayBtn');
  if(!btn)return;
  if(isDaySaved(person,day)){
    btn.textContent='🔒 Guardado';
    btn.classList.add('saved');
    btn.disabled=true;
  }else if(!isToday(day)){
    btn.textContent='🔒 No disponible';
    btn.classList.add('saved');
    btn.disabled=true;
  }else{
    btn.textContent='💾 Guardar';
    btn.classList.remove('saved');
    btn.disabled=false;
  }
}

function toggleWU(kind,idx){ // kind: 'warmup' | 'cooldown'
  if(!isDayEditable(person,day))return;
  const dd=dayDoneObj(person,day);
  dd[kind][idx]=!dd[kind][idx];
  const el=document.getElementById(kind+'-'+idx);
  if(el)el.classList.toggle('done',dd[kind][idx]);
  saveDone();updateWeekProg();updateDayRing();renderDayDots();
}

function toggleDone(idx){
  if(!isDayEditable(person,day))return;
  const dd=dayDoneObj(person,day);
  dd.ex[idx]=!dd.ex[idx];
  const card=document.getElementById('exc-'+idx);
  const txt=document.getElementById('chktxt-'+idx);
  const isDone=dd.ex[idx];
  card.classList.toggle('done',isDone);
  txt.textContent=isDone?'¡Listo!':'Marcar completado';
  if(isDone && openDet.has(idx)){
    openDet.delete(idx);
    const det=document.getElementById('det-'+idx);
    const expbtn=document.getElementById('expbtn-'+idx);
    if(det)det.classList.remove('open');
    if(expbtn){expbtn.classList.remove('open');expbtn.querySelector('.btxt').textContent='Ver más';}
  }
  saveDone();updateWeekProg();updateDayRing();renderDayDots();
}

function toggleDet(idx){
  const det=document.getElementById('det-'+idx);
  const btn=document.getElementById('expbtn-'+idx);
  if(openDet.has(idx)){openDet.delete(idx);det.classList.remove('open');btn.classList.remove('open');btn.querySelector('.btxt').textContent='Ver más';}
  else{openDet.add(idx);det.classList.add('open');btn.classList.add('open');btn.querySelector('.btxt').textContent='Ocultar';}
}

function setPerson(p){
  person=p;day=0;openDet.clear();
  document.querySelectorAll('.ptab').forEach((t,i)=>t.classList.toggle('active',i===(p==='yo'?0:1)));
  renderDayTabs();renderContent();updateWeekProg();updateDayRing();
}
function setDay(d){
  day=d;openDet.clear();
  document.querySelectorAll('.dtab').forEach((t,i)=>t.classList.toggle('active',i===d));
  renderContent();updateDayRing();window.scrollTo({top:0,behavior:'smooth'});
}

function renderDayDots(){
  document.querySelectorAll('.dtab').forEach((t,i)=>{
    const existing=t.querySelector('.dtick');
    const allDone=doneDayItems(person,i)===totalDayItems(person,i)&&totalDayItems(person,i)>0;
    if(allDone&&!existing){const s=document.createElement('span');s.className='dtick';t.appendChild(s);}
    else if(!allDone&&existing){existing.remove();}
  });
}

function renderDayTabs(){
  document.getElementById('dayTabs').innerHTML=routines[person].days.map((d,i)=>{
    const lock=isDayLocked(person,i)?' 🔒':'';
    return `<button class="dtab${i===day?' active':''}" onclick="setDay(${i})">${d.short}${lock}</button>`;
  }).join('');
  renderDayDots();
}

function renderWUList(kind,items,dd){
  return items.map((it,i)=>{
    const isDone=!!dd[kind][i];
    return `<div class="item${isDone?' done':''}" id="${kind}-${i}">
      <span class="item-ico">${it.ico}</span>
      <div class="item-body"><div class="item-name">${it.name}</div><div class="item-sub">${it.sub}</div></div>
      <button class="item-chk" onclick="toggleWU('${kind}',${i})"><svg width="10" height="8" viewBox="0 0 11 9" fill="none"><polyline points="1,4.5 4,7.5 10,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>`;
  }).join('');
}

function renderContent(){
  const d=dayData(person,day);
  const dd=dayDoneObj(person,day);
  const saved=isDaySaved(person,day);
  const notToday=!isToday(day);

  let bannerMsg='';
  if(saved)bannerMsg='🔒 Día guardado en tu historial. Para corregirlo, usa Reset semanal.';
  else if(notToday)bannerMsg='🔒 Solo puedes marcar y guardar el día de hoy. Este día no está disponible para editar.';

  let html=bannerMsg?`<div class="lockedbanner">${bannerMsg}</div>`:'';
  html+=`
  <div class="itemlist">
  ${renderWUList('warmup',d.warmup,dd)}
  </div>
  <div class="exlist" style="margin-top:9px">`;

  d.exercises.forEach((ex,i)=>{
    const info=EX[ex.k]||{};
    const isDone=!!dd.ex[i];
    const stepsHTML=(info.pasos||[]).map((p,n)=>`<li data-n="${n+1}">${p}</li>`).join('');
    html+=`<div class="exc${isDone?' done':''}" id="exc-${i}">
      <div class="extop">
        <div class="exillo">${SVG[ex.img]||''}</div>
        <div class="exbody">
          <div class="exname">${i+1}. ${ex.name}</div>
          <div class="badges">
            <span class="badge bs">${ex.s}x</span>
            <span class="badge br">${ex.r}</span>
            <span class="badge bt">${ex.t}</span>
          </div>
        </div>
      </div>
      <div class="exrow2">
        <button class="expbtn" id="expbtn-${i}" onclick="toggleDet(${i})"><span class="btxt">Ver más</span><span class="arr">▾</span></button>
        <button class="chkbtn" id="chk-${i}" onclick="toggleDone(${i})">
          <div class="chk-circle"><svg width="10" height="8" viewBox="0 0 11 9" fill="none"><polyline points="1,4.5 4,7.5 10,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <span class="chk-txt" id="chktxt-${i}">${isDone?'¡Listo!':'Marcar completado'}</span>
        </button>
      </div>
      <div class="exdet" id="det-${i}">
        ${info.desc?`<div class="dsec"><div class="dlabel">Para qué sirve</div><div class="dtext">${info.desc}</div></div>`:''}
        ${info.pos?`<div class="dsec"><div class="dlabel">Cómo te colocas</div><div class="dtext">${info.pos}</div></div>`:''}
        ${stepsHTML?`<div class="dsec"><div class="dlabel">Pasos</div><ul class="dsteps">${stepsHTML}</ul></div>`:''}
        ${info.tip?`<div class="tipbox">💡 ${info.tip}</div>`:''}
      </div>
    </div>`;
  });

  html+=`</div><div class="itemlist" style="margin-top:9px">${renderWUList('cooldown',d.cooldown,dd)}</div>`;
  document.getElementById('content').innerHTML=html;
}

function resetSemana(){
  if(!confirm('¿Reiniciar todos los ítems completados de esta semana?'))return;
  done[person]=emptyDonePerson();
  savedDays[person]=[false,false,false,false,false];
  saveDone();saveSavedFlags();openDet.clear();renderDayTabs();renderContent();updateWeekProg();updateDayRing();
}

// ---- RESUMEN: lee el log histórico y arma texto ----
function parseKey(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
function isoWeekStart(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
function buildResumen(){
  const entries=log[person]||{};
  const keys=Object.keys(entries).sort();
  if(keys.length===0)return 'Aún no hay registros guardados para '+(person==='yo'?'ti':'tu pareja')+'.\n¡Marca tu primer ejercicio para empezar a generar historial!';

  const now=new Date();
  const todayK=todayKey();
  const wkStart=isoWeekStart(now);
  const monthPrefix=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');

  // Hoy
  const hoy=entries[todayK];
  const hoyTxt=hoy?`${hoy.done}/${hoy.total} (${pct(hoy.done,hoy.total)}%)`:'sin registro aún';

  // Semana actual (lun-dom)
  let semDone=0,semTotal=0,semDias=0;
  keys.forEach(k=>{
    const dt=parseKey(k);
    if(dt>=wkStart){semDone+=entries[k].done;semTotal+=entries[k].total;semDias++;}
  });
  const semPct=pct(semDone,semTotal);

  // Mes actual
  let mesDone=0,mesTotal=0,mesDias=0;
  const diasDelMes=[];
  keys.forEach(k=>{
    if(k.startsWith(monthPrefix)){
      mesDone+=entries[k].done;mesTotal+=entries[k].total;mesDias++;
      diasDelMes.push(k+': '+entries[k].done+'/'+entries[k].total);
    }
  });
  const mesPct=pct(mesDone,mesTotal);

  const nombre=person==='yo'?'Yo (Fútbol & Masa)':'Pareja (Tonificar)';
  const fechaHoy=now.toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'});

  let txt=`🏋️ RESUMEN DE ENTRENAMIENTO\n${nombre}\n${fechaHoy}\n\n`;
  txt+=`📅 HOY: ${hoyTxt}\n\n`;
  txt+=`📆 ESTA SEMANA (${semDias} día${semDias!==1?'s':''} entrenado${semDias!==1?'s':''}):\n${semDone}/${semTotal} ítems · ${semPct}% cumplimiento\n\n`;
  txt+=`🗓️ ESTE MES (${mesDias} día${mesDias!==1?'s':''} entrenado${mesDias!==1?'s':''}):\n${mesDone}/${mesTotal} ítems · ${mesPct}% cumplimiento\n`;
  return txt;
}

function showResumen(){
  document.getElementById('resumenBox').textContent=buildResumen();
  document.getElementById('modalBg').classList.add('open');
}
function closeResumen(){document.getElementById('modalBg').classList.remove('open');}
function copyResumen(){
  const txt=document.getElementById('resumenBox').textContent;
  const btn=document.getElementById('copyBtn');
  function ok(){btn.textContent='✓ Copiado';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copiar texto';btn.classList.remove('copied');},1800);}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok).catch(()=>{fallbackCopy(txt,ok);});
  }else{fallbackCopy(txt,ok);}
}
function fallbackCopy(txt,cb){
  const ta=document.createElement('textarea');
  ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');cb();}catch(e){}
  document.body.removeChild(ta);
}

renderDayTabs();
renderContent();
updateWeekProg();
updateDayRing();
</script>
