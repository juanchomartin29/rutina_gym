<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Team Margi — Rutina semanal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --acc:#3DDC97;--acc2:#4FA3D1;--warn:#E8A33D;--danger:#E0556F;
  --bg:#15171F;--card:#1C1F2A;--card2:#22263380;--tx:#EDEEF2;--ts:#8C90A3;--bd:#2C3040;
  --exbg:#1A2B26;--exbd:#2C4A3E;
}
body{font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* HEADER */
.hdr{background:rgba(21,23,31,.95);border-bottom:1px solid var(--bd);padding:12px 12px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.htop{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.brand{flex:1;min-width:0}
.brand h1{font-size:18px;font-weight:900;letter-spacing:-.3px;line-height:1.15}
.brand h1 .accent{color:var(--acc)}
.brand .tagline{font-size:8.5px;color:var(--ts);font-weight:700;letter-spacing:.3px;text-transform:uppercase;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.resetbtn{flex-shrink:0;background:rgba(224,85,111,.12);border:1px solid rgba(224,85,111,.35);color:var(--danger);border-radius:7px;padding:5px 9px;font-size:10px;font-weight:800;cursor:pointer;-webkit-appearance:none}

/* PROGRESS */
.prog-wrap{margin-bottom:10px;background:var(--card);border:1px solid var(--bd);border-radius:9px;padding:7px 11px}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.prog-label{font-size:10px;font-weight:800;color:var(--ts);letter-spacing:.3px;text-transform:uppercase}
.prog-pct{font-size:11px;font-weight:900;color:var(--acc)}
.prog-bar{height:6px;background:var(--bd);border-radius:50px;overflow:hidden}
.prog-fill{height:100%;border-radius:50px;background:var(--acc);transition:width .4s ease}

/* PERSON TABS */
.ptabs{display:flex;gap:7px;margin-bottom:9px}
.ptab{flex:1;padding:8px 4px;border-radius:9px;border:1.5px solid var(--bd);font-size:9.5px;font-weight:800;cursor:pointer;background:var(--card);color:var(--ts);text-align:center;-webkit-appearance:none;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ptab.active{background:var(--acc2);color:#fff;border-color:var(--acc2)}

/* DAY TABS + DAY NOW (todo en el header, compacto) */
.dayrow{margin-bottom:9px}
.dtabs{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:7px}
.dtab{padding:6px 4px;border-radius:8px;border:1.5px solid var(--bd);font-size:10px;font-weight:800;cursor:pointer;background:var(--card);color:var(--ts);white-space:nowrap;-webkit-appearance:none;transition:all .15s;text-align:center}
.dtab.active{background:var(--acc);color:#0D1410;border-color:var(--acc)}
.dtab .dtick{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--acc);margin-left:3px;vertical-align:middle}
.dtab.active .dtick{background:#0D1410}

.dnow{padding:8px 10px;background:var(--card);border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.savebtn{flex-shrink:0;background:rgba(61,220,151,.15);border:1.5px solid var(--acc);color:var(--acc);border-radius:8px;padding:7px 9px;font-size:9.5px;font-weight:800;cursor:pointer;-webkit-appearance:none;white-space:nowrap}
.savebtn.saved{background:rgba(140,144,163,.12);border-color:var(--bd);color:var(--ts)}
.lockedbanner{background:rgba(140,144,163,.1);border:1px solid var(--bd);border-radius:9px;padding:8px 10px;font-size:10.5px;color:var(--ts);font-weight:700;margin-bottom:9px;text-align:center}
.dnow-txt{min-width:0}
.dnow-title{font-size:12.5px;font-weight:800;color:var(--tx);line-height:1.3}
.dnow-focus{font-size:9.5px;color:var(--ts);margin-top:1px;font-weight:600}

/* CONTENT */
.content{padding:11px}

/* DAY PROGRESS RING - compacta, integrada en dnow */
.day-prog-ring{position:relative;width:32px;height:32px;flex-shrink:0}
.day-prog-ring svg{width:32px;height:32px;transform:rotate(-90deg)}
.day-prog-ring .ring-bg{fill:none;stroke:var(--bd);stroke-width:4}
.day-prog-ring .ring-fill{fill:none;stroke:var(--acc);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .4s ease}
.day-prog-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8px;font-weight:900;color:var(--acc)}

/* GRID DE ITEMS - 2 columnas compactas para warmup/cooldown */
.itemlist{display:grid;grid-template-columns:1fr 1fr;gap:6px}

/* ITEM CARD genérica (warmup/cooldown) - color neutro, compacta */
.item{background:var(--card);border:1.5px solid var(--bd);border-radius:10px;display:flex;align-items:center;gap:6px;padding:7px 8px;transition:all .2s;min-width:0}
.item.done{border-color:var(--acc);background:rgba(61,220,151,.06)}
.item-ico{font-size:14px;flex-shrink:0}
.item-body{flex:1;min-width:0}
.item-name{font-size:10px;font-weight:800;color:var(--tx);line-height:1.25}
.item.done .item-name{color:var(--acc)}
.item-sub{font-size:8.5px;color:var(--ts);line-height:1.3;margin-top:1px;font-weight:600}
.item-chk{flex-shrink:0;width:19px;height:19px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-appearance:none;background:none;transition:all .2s}
.item.done .item-chk{background:var(--acc);border-color:var(--acc)}
.item-chk svg{opacity:0;transition:opacity .2s}
.item.done .item-chk svg{opacity:1}

/* EX CARD - color diferencial verde oscuro para distinguir de warmup/cooldown */
.exc{background:var(--exbg);border:1.5px solid var(--exbd);border-radius:13px;overflow:hidden;transition:all .2s}
.exc.done{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc) inset}

.extop{display:flex;gap:9px;align-items:center;padding:9px 10px}
.exillo{flex-shrink:0;width:54px;height:54px;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--bd)}
.exc.done .exillo{border-color:var(--acc)}
.exillo svg{width:46px;height:46px}
.exbody{flex:1;min-width:0}
.exname{font-size:12.5px;font-weight:800;color:var(--tx);line-height:1.3;margin-bottom:4px}
.exc.done .exname{color:var(--acc)}
.badges{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-size:9.5px;padding:2px 6px;border-radius:5px;font-weight:800}
.bs{background:rgba(61,220,151,.15);color:var(--acc)}
.br{background:rgba(79,163,209,.15);color:var(--acc2)}
.bt{background:rgba(140,144,163,.15);color:var(--ts)}

.exrow2{display:flex;border-top:1px solid var(--exbd)}
.expbtn{flex:1;background:none;border:none;border-right:1px solid var(--exbd);padding:7px 10px;text-align:center;font-size:10px;font-weight:800;color:var(--acc2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;-webkit-appearance:none}
.expbtn .arr{transition:transform .25s;font-size:11px}
.expbtn.open .arr{transform:rotate(180deg)}
.chkbtn{flex:1;background:none;border:none;padding:7px 10px;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;-webkit-appearance:none;font-size:10px;font-weight:800}
.chk-circle{width:18px;height:18px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.exc.done .chk-circle{background:var(--acc);border-color:var(--acc)}
.chk-circle svg{opacity:0;transition:opacity .2s}
.exc.done .chk-circle svg{opacity:1}
.chk-txt{color:var(--ts)}
.exc.done .chk-txt{color:var(--acc)}

.exdet{display:none;padding:0 12px 11px;border-top:1px solid var(--exbd)}
.exdet.open{display:block;padding-top:9px}
.dsec{margin-bottom:9px}
.dlabel{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--acc2);margin-bottom:3px}
.dtext{font-size:11.5px;color:var(--ts);line-height:1.5;font-weight:600}
.dsteps{list-style:none;padding:0}
.dsteps li{font-size:11.5px;color:var(--ts);line-height:1.5;padding:4px 0 4px 18px;position:relative;border-bottom:1px solid var(--exbd);font-weight:600}
.dsteps li:last-child{border-bottom:none}
.dsteps li::before{content:attr(data-n);position:absolute;left:0;font-weight:900;color:var(--acc2);font-size:10px}
.tipbox{background:rgba(232,163,61,.1);border:1px solid rgba(232,163,61,.3);border-radius:8px;padding:8px 10px;font-size:11.5px;color:var(--warn);line-height:1.5;font-weight:600}

.footer{text-align:center;padding:16px;font-size:10px;color:var(--ts);line-height:1.7;font-weight:600}

/* MODAL RESUMEN */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--card);border-top:1px solid var(--bd);border-radius:18px 18px 0 0;padding:16px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.modal-hdr h2{font-size:15px;font-weight:800}
.modal-close{background:var(--bd);border:none;color:var(--tx);width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;-webkit-appearance:none}
.modal-box{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px;font-size:12px;line-height:1.7;white-space:pre-wrap;font-family:inherit;color:var(--tx);font-weight:600;max-height:45vh;overflow-y:auto}
.modal-copybtn{width:100%;margin-top:10px;padding:11px;border-radius:10px;border:none;background:var(--acc);color:#0D1410;font-weight:800;font-size:13px;cursor:pointer;-webkit-appearance:none}
.modal-copybtn.copied{background:var(--acc2)}
</style>
</head>
<body>
<div class="hdr">
  <div class="htop">
    <div class="brand">
      <h1>🔥 TEAM <span class="accent">MARGI</span></h1>
      <div class="tagline">Ejercicio y disciplina en casa</div>
    </div>
    <button class="resetbtn" onclick="resetSemana()" title="Reiniciar semana">↺ Reset</button>
    <button class="resetbtn" style="background:rgba(79,163,209,.12);border-color:rgba(79,163,209,.35);color:var(--acc2)" onclick="showResumen()" title="Ver resumen">📊 Resumen</button>
  </div>
  <div class="prog-wrap">
    <div class="prog-row">
      <span class="prog-label" id="wpLabel">Progreso semanal</span>
      <span class="prog-pct" id="wpPct">0%</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="wpFill" style="width:0%"></div></div>
  </div>
  <div class="ptabs">
    <button class="ptab active" onclick="setPerson('yo')">🧑 Juan Martín — Man</button>
    <button class="ptab" onclick="setPerson('pareja')">👩 Estefanía Giraldo — Woman</button>
  </div>
  <div class="dayrow">
    <div class="dtabs" id="dayTabs"></div>
    <div class="dnow" id="dayNow">
      <div class="dnow-txt"><div class="dnow-title" id="dnowTitle"></div><div class="dnow-focus" id="dnowFocus"></div></div>
      <div class="day-prog-ring">
        <svg viewBox="0 0 38 38">
          <circle class="ring-bg" cx="19" cy="19" r="16"/>
          <circle class="ring-fill" id="dpRingFill" cx="19" cy="19" r="16"/>
        </svg>
        <span class="day-prog-pct" id="dpPct">0%</span>
      </div>
      <button class="savebtn" id="saveDayBtn" onclick="guardarDia()">💾 Guardar</button>
    </div>
  </div>
</div>

<div class="content" id="content"></div>
<div class="footer">Descansa sáb y dom · 7-8h de sueño · Hidratación constante</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeResumen()">
  <div class="modal">
    <div class="modal-hdr"><h2>📊 Mi resumen</h2><button class="modal-close" onclick="closeResumen()">✕</button></div>
    <div class="modal-box" id="resumenBox">Cargando...</div>
    <button class="modal-copybtn" id="copyBtn" onclick="copyResumen()">Copiar texto</button>
  </div>
</div>

const EX={
sentadilla_smith:{desc:"El ejercicio más importante para piernas. Trabaja muslos y glúteos a la vez.",pos:"En la máquina Smith, apoya la barra sobre la espalda alta (no en el cuello). Pies al ancho de los hombros.",pasos:["Baja como si te fueras a sentar en una silla.","Baja hasta que los muslos queden paralelos al piso.","Sube empujando con los talones."],tip:"La Smith ya guía el movimiento, así que solo concéntrate en bajar bien y controlado."},
peso_muerto:{desc:"Fortalece toda la espalda baja, glúteos y piernas. Muy completo, pero hay que cuidar la postura.",pos:"De pie frente a la barra, pies al ancho de caderas. Agarra la barra cerca de las piernas.",pasos:["Dobla rodillas y caderas manteniendo la espalda recta (no encorvada).","Levanta la barra pegada al cuerpo, empujando el piso con los pies.","Termina de pie, apretando los glúteos."],tip:"Lo más importante: nunca dejes que la espalda baja se redondee. Si pasa, baja el peso."},
extension_cuad:{desc:"Ejercicio simple en máquina para fortalecer la parte de adelante del muslo.",pos:"Siéntate en la máquina, apoya los tobillos detrás del cojín.",pasos:["Estira las piernas hacia adelante hasta que queden rectas.","Aguanta 1 segundo arriba.","Baja despacio, sin dejar caer el peso de golpe."],tip:"Bajar lento es lo que más trabaja el músculo, no te apures."},
intervalos_caminadora:{desc:"Cardio que alterna rápido y lento. Ideal para mejorar tu aguante en la cancha.",pos:"En la caminadora. Mantente erguido, mirando al frente.",pasos:["3 min caminando suave para entrar en calor.","1 min rápido, 1 min lento. Repite varias veces.","Termina con 3 min caminando suave."],tip:"Si en el minuto rápido no puedes ni hablar, vas en el ritmo correcto."},
prensa_pecho:{desc:"Ejercicio de empuje para fortalecer el pecho, usando la multiestación.",pos:"Siéntate en la multiestación, agarra las manijas a la altura del pecho.",pasos:["Empuja hacia adelante hasta casi estirar los brazos (sin bloquear los codos).","Regresa despacio, sintiendo el pecho trabajar."],tip:"Imagina que quieres juntar tus manos al empujar: eso ayuda a sentir bien el pecho."},
press_hombros_mancuerna:{desc:"Fortalece los hombros. Se hace con una mancuerna en cada mano.",pos:"Sentado o de pie, mancuernas a la altura de las orejas, codos doblados.",pasos:["Empuja ambas mancuernas hacia arriba hasta casi juntarlas.","Baja despacio y controlado."],tip:"Si arqueas mucho la espalda al subir, el peso está muy alto. Baja un poco."},
fondos_barra:{desc:"Ejercicio con tu propio peso para fortalecer pecho y brazos, usando la barra colgada.",pos:"Sujétate a la barra con los brazos estirados, cuerpo recto.",pasos:["Baja doblando los codos hasta sentir un buen estiramiento en el pecho.","Empuja hacia arriba sin hacer rebote."],tip:"Si no logras hacer muchas, no pasa nada: baja menos al principio e ir mejorando poco a poco."},
plancha_abdominal:{desc:"Ejercicio de aguante para fortalecer el abdomen. No te mueves, solo aguantas la posición.",pos:"Sobre el piso (con colchoneta), apoyado en antebrazos y puntas de los pies. Cuerpo recto como una tabla.",pasos:["Aprieta el abdomen y los glúteos.","Aguanta el tiempo indicado respirando normal.","Si la cadera se cae, termina ahí la serie."],tip:"Mejor aguantar 30 segundos bien hechos que 60 segundos con mala postura."},
bicicleta_intervalos:{desc:"Cardio suave para las articulaciones. Ayuda a quemar grasa sin golpear las rodillas.",pos:"En la bicicleta spinning, ajusta el asiento a una altura cómoda.",pasos:["5 min suave para calentar.","Alterna 1 min fuerte y 1 min suave, varias veces.","Termina 5 min suave."],tip:"No hace falta ir al máximo todo el tiempo: el truco está en alternar el ritmo."},
caminadora_inclinada:{desc:"Caminar con inclinación. Quema más calorías que caminar plano y trabaja bien las piernas.",pos:"En la caminadora. No te agarres de las barras, eso le quita efecto al ejercicio.",pasos:["Camina 2 min sin inclinación para entrar en calor.","Sube la inclinación y mantén un paso firme.","Si necesitas agarrarte, baja un poco la inclinación."],tip:"Caminar inclinado trabaja mucho los glúteos, sin el impacto de correr."},
remo_polea:{desc:"Ejercicio de jalón en la multiestación, para fortalecer toda la espalda.",pos:"Sentado frente a la polea, agarra el mango con ambas manos, espalda recta.",pasos:["Tira del mango hacia tu abdomen, llevando los codos atrás.","Aprieta la espalda un segundo.","Regresa despacio estirando los brazos."],tip:"Piensa en jalar con los codos, no solo con las manos: así trabaja mejor la espalda."},
remo_inclinado_barra:{desc:"Ejercicio con barra para fortalecer la espalda completa. Un poco más exigente.",pos:"De pie, inclina el torso hacia adelante, sostén la barra con los brazos colgando.",pasos:["Tira la barra hacia tu abdomen.","Aprieta la espalda arriba un segundo.","Baja despacio."],tip:"Si tu cuerpo se mueve mucho de arriba a abajo, el peso está muy alto."},
curl_bicep:{desc:"El clásico ejercicio para fortalecer los brazos (bíceps).",pos:"De pie, mancuerna en cada mano, brazos abajo y codos pegados al cuerpo.",pasos:["Sube la mancuerna doblando solo el codo (no muevas el hombro).","Aprieta arriba un segundo.","Baja despacio."],tip:"Si tu cuerpo se balancea para ayudar a subir el peso, significa que está muy pesado."},
peso_muerto_rumano:{desc:"Variante del peso muerto que se enfoca en la parte de atrás de las piernas.",pos:"De pie con la barra, rodillas casi rectas (con una leve flexión).",pasos:["Empuja la cadera hacia atrás bajando la barra por tus piernas.","Vas a sentir que estiras la parte de atrás del muslo: es normal.","Sube empujando la cadera hacia adelante."],tip:"Si sientes dolor en la espalda baja en vez de estiramiento en la pierna, revisa tu postura."},
press_hombros_smith:{desc:"Igual que el press de hombros, pero con la máquina Smith que guía el movimiento.",pos:"Siéntate bajo la barra de la Smith, agárrala a la altura de la barbilla.",pasos:["Empuja la barra hacia arriba en línea recta.","Baja controlado hasta la altura del mentón."],tip:"La máquina te ayuda con el equilibrio, así que enfócate solo en empujar fuerte y controlado."},
zancadas_mancuerna:{desc:"Ejercicio que trabaja una pierna a la vez. Bueno para piernas, glúteos y equilibrio.",pos:"De pie, mancuerna en cada mano, pies juntos.",pasos:["Da un paso largo hacia adelante.","Baja hasta que la rodilla de atrás casi toque el piso.","Empuja con el pie de adelante para volver."],tip:"Si la rodilla de adelante se mete hacia adentro, hazla con menos peso primero."},
carrera_continua:{desc:"Trotar a ritmo parejo. Mejora tu resistencia general para el fútbol.",pos:"En la caminadora, postura relajada, brazos en movimiento natural.",pasos:["3 min caminando rápido para entrar en calor.","Sube el ritmo y mantenlo constante.","Termina bajando la velocidad poco a poco."],tip:"Si puedes hablar con frases cortas pero te cuesta un poco, vas en el ritmo justo."},
glute_bridge:{desc:"Ejercicio básico y muy efectivo para activar los glúteos. Ideal para empezar.",pos:"Acostado boca arriba (con colchoneta), rodillas dobladas, pies apoyados en el piso.",pasos:["Aprieta los glúteos y sube la cadera hacia el techo.","Aguanta 1-2 segundos arriba.","Baja despacio."],tip:"Si sientes más esfuerzo en la parte de atrás del muslo que en el glúteo, acerca un poco los pies a tu cuerpo."},
hip_thrust_mancuerna:{desc:"Versión con peso del glute bridge. Uno de los mejores ejercicios para tonificar los glúteos.",pos:"Espalda apoyada en un banco, mancuerna sobre las caderas (usa una toalla para que no incomode).",pasos:["Baja la cadera casi hasta el piso.","Sube con fuerza apretando los glúteos.","Aguanta arriba 1-2 segundos."],tip:"Apunta un poco las puntas de los pies hacia afuera: ayuda a sentir más el glúteo."},
sentadilla_mancuerna:{desc:"Sentadilla con mancuernas. Más fácil de aprender que con barra.",pos:"De pie, mancuernas a los lados o sostenidas frente al pecho.",pasos:["Baja como si te sentaras en una silla.","Baja hasta que los muslos queden paralelos al piso.","Sube empujando con los talones."],tip:"Si los talones se levantan al bajar, es normal al inicio. Mejora con la práctica."},
zancadas_sin_peso:{desc:"Igual que las zancadas, pero sin peso. Perfecto para aprender el movimiento primero.",pos:"De pie, pies juntos, manos en la cintura.",pasos:["Da un paso largo hacia adelante.","Baja hasta que la rodilla de atrás casi toque el piso.","Empuja con el pie de adelante para volver."],tip:"Practica frente a un espejo para revisar que tu cuerpo no se incline demasiado."},
bicicleta_suave:{desc:"Cardio muy suave, ideal para retomar el ejercicio sin exigir de más.",pos:"En la bicicleta spinning, ajusta el asiento a una altura cómoda.",pasos:["Empieza muy suave los primeros 3 min.","Sube un poco el ritmo, a uno donde puedas hablar normal.","Termina suave de nuevo."],tip:"Si puedes hablar sin problema pero no podrías cantar, ese es tu ritmo ideal."},
plancha_rodillas:{desc:"Versión más fácil de la plancha, apoyando las rodillas. Perfecta para empezar.",pos:"Sobre colchoneta, antebrazos en el piso, rodillas apoyadas (en vez de los pies).",pasos:["Aprieta el abdomen suavemente.","Mantén la cadera ni muy alta ni muy baja.","Respira normal todo el tiempo."],tip:"Cuando puedas aguantar 45 segundos cómodo, prueba la plancha completa con los pies."},
plancha_completa:{desc:"La plancha completa, apoyando los pies en vez de las rodillas. Más exigente.",pos:"Sobre colchoneta, antebrazos en el piso, puntas de los pies apoyadas. Cuerpo bien recto.",pasos:["Aprieta abdomen y glúteos al mismo tiempo.","Mantén la cabeza alineada, sin mirar hacia arriba.","Para cuando sientas que la cadera empieza a caer."],tip:"Suma 5 segundos cada semana. Poco a poco vas a aguantar mucho más."},
glute_bridge_pausa:{desc:"El mismo glute bridge, pero aguantando un poco más arriba para sentir más el glúteo.",pos:"Igual que el glute bridge normal, acostado boca arriba con rodillas dobladas.",pasos:["Sube la cadera apretando fuerte el glúteo.","Aguanta 2 segundos arriba, bien apretado.","Baja muy despacio."],tip:"Cuando se sienta fácil, puedes sostener una mancuerna sobre la cadera para más reto."},
hip_thrust_barra:{desc:"Hip thrust con barra. Permite usar más peso que con mancuerna, para seguir progresando.",pos:"Espalda apoyada en un banco, barra sobre las caderas (con toalla o cojín de protección).",pasos:["Baja la cadera casi hasta el piso.","Sube con fuerza apretando los glúteos.","Baja controlado, sin dejar caer el peso."],tip:"Tus pies deben quedar lo bastante lejos del banco para que las piernas queden verticales arriba."},
sentadilla_sumo:{desc:"Sentadilla con los pies bien abiertos. Trabaja más la parte interna de la pierna y el glúteo.",pos:"Pies más abiertos que los hombros, puntas hacia afuera. Mancuerna sostenida entre las piernas.",pasos:["Baja doblando las rodillas hacia donde apuntan los pies.","Baja hasta que los muslos queden paralelos al piso.","Sube apretando los glúteos."],tip:"Si las rodillas se cierran hacia adentro, usa menos peso por ahora."},
caminadora_larga:{desc:"Caminata larga con inclinación. El ejercicio que más ayuda a quemar grasa esta semana.",pos:"En la caminadora, igual que la versión inclinada pero más tiempo.",pasos:["3 min plano para entrar en calor.","Sube la inclinación poco a poco.","Mantén el ritmo el resto del tiempo.","Termina 1 min muy suave."],tip:"20 minutos así queman parecido a correr 15 minutos, pero sin tanto golpe en las rodillas."},
zancadas_con_peso:{desc:"Zancadas con mancuernas para sumar más exigencia al ejercicio.",pos:"De pie, mancuerna en cada mano. No uses más peso del que puedas controlar bien.",pasos:["Paso largo hacia adelante.","Rodilla de atrás casi toca el piso.","Empuja con el pie de adelante para volver."],tip:"Empieza con mancuernas livianas (4-6 kg) e ir subiendo poco a poco."},
glute_bridge_unilateral:{desc:"Glute bridge con una sola pierna. Más exigente, ayuda a parejar la fuerza entre ambos lados.",pos:"Acostado boca arriba, una pierna estirada en el aire, el otro pie apoyado en el piso.",pasos:["Aprieta el glúteo del lado apoyado y sube la cadera.","Aguanta 1-2 segundos arriba.","Baja despacio."],tip:"Es normal que un lado te cueste más que el otro al principio. Con el tiempo se pareja."},
abdominal_rueda:{desc:"Ejercicio más avanzado para todo el abdomen, usando la rueda.",pos:"De rodillas sobre colchoneta, sujeta la rueda con ambas manos frente a ti.",pasos:["Rueda hacia adelante estirando el cuerpo, solo hasta donde controles.","No dejes que la espalda baja se hunda.","Usa el abdomen (no los brazos) para volver."],tip:"Al principio es normal no poder ir muy lejos. Mejora poco a poco cada semana."},
escaladora_cardio:{desc:"Cardio fuerte en la escaladora, trabaja piernas y sube bastante el ritmo cardiaco.",pos:"De pie en la escaladora, manos apoyadas suaves en los lados, espalda recta.",pasos:["Pasos cortos y seguidos, sin colgarte de los brazos.","Mantén el cuerpo derecho, sin inclinarte hacia adelante."],tip:"Deja que las piernas hagan el trabajo, los brazos son solo para mantener el equilibrio."},
};

// Estado con persistencia localStorage. Estructura: {warmup:[bool], cooldown:[bool], ex:[bool]}
let person='yo', day=0, openDet=new Set();
function emptyDoneDay(){return {warmup:[],cooldown:[],ex:[]}}
function emptyDonePerson(){return Array.from({length:5},emptyDoneDay)}
function loadDone(){
  try{
    const s=localStorage.getItem('gym_done_v2');
    if(s)return JSON.parse(s);
  }catch(e){}
  return {yo:emptyDonePerson(),pareja:emptyDonePerson()};
}
function saveDone(){try{localStorage.setItem('gym_done_v2',JSON.stringify(done));}catch(e){}}
const done=loadDone();

// ---- LOG HISTÓRICO (independiente por dispositivo) ----
// Estructura: { "yo": { "2026-06-19": {done:6, total:10, dayName:"Viernes"} }, "pareja": {...} }
function loadLog(){
  try{const s=localStorage.getItem('gym_log_v1');if(s)return JSON.parse(s);}catch(e){}
  return {yo:{},pareja:{}};
}
function saveLog(){try{localStorage.setItem('gym_log_v1',JSON.stringify(log));}catch(e){}}
const log=loadLog();
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// ---- GUARDADO MANUAL: qué días de ESTA semana visible ya fueron guardados ----
// Estructura: { "yo": [false,false,false,false,false], "pareja": [...] }  (índice = día 0-4)
function loadSaved(){
  try{const s=localStorage.getItem('gym_saved_days_v1');if(s)return JSON.parse(s);}catch(e){}
  return {yo:[false,false,false,false,false],pareja:[false,false,false,false,false]};
}
function saveSavedFlags(){try{localStorage.setItem('gym_saved_days_v1',JSON.stringify(savedDays));}catch(e){}}
const savedDays=loadSaved();
function isDaySaved(p,d){return !!(savedDays[p]&&savedDays[p][d]);}

function guardarDia(){
  if(isDaySaved(person,day)){
    alert('Este día ya fue guardado. Si quieres corregirlo, primero presiona Reset semanal.');
    return;
  }
  const td=totalDayItems(person,day), dn=doneDayItems(person,day);
  if(!log[person])log[person]={};
  log[person][todayKey()]={done:dn,total:td,dayName:dayData(person,day).name};
  saveLog();
  if(!savedDays[person])savedDays[person]=[false,false,false,false,false];
  savedDays[person][day]=true;
  saveSavedFlags();
  renderDayTabs();renderContent();
  alert('✅ Guardado registro semanal\n'+dayData(person,day).name+': '+dn+'/'+td+' completado');
}

function dayData(p,d){return routines[p].days[d]}
function dayDoneObj(p,d){
  if(!done[p][d])done[p][d]=emptyDoneDay();
  const dd=done[p][d], dat=dayData(p,d);
  if(dd.warmup.length!==dat.warmup.length)dd.warmup=dat.warmup.map((_,i)=>!!dd.warmup[i]);
  if(dd.cooldown.length!==dat.cooldown.length)dd.cooldown=dat.cooldown.map((_,i)=>!!dd.cooldown[i]);
  if(dd.ex.length!==dat.exercises.length)dd.ex=dat.exercises.map((_,i)=>!!dd.ex[i]);
  return dd;
}

function totalDayItems(p,d){const dat=dayData(p,d);return dat.warmup.length+dat.cooldown.length+dat.exercises.length}
function doneDayItems(p,d){const dd=dayDoneObj(p,d);return dd.warmup.filter(Boolean).length+dd.cooldown.filter(Boolean).length+dd.ex.filter(Boolean).length}
function totalWeekItems(p){let t=0;routines[p].days.forEach((_,d)=>t+=totalDayItems(p,d));return t}
function doneWeekItems(p){let t=0;routines[p].days.forEach((_,d)=>t+=doneDayItems(p,d));return t}
function pct(a,b){return b?Math.round(a/b*100):0}

function updateWeekProg(){
  const tw=totalWeekItems(person), dw=doneWeekItems(person), p=pct(dw,tw);
  document.getElementById('wpPct').textContent=p+'%';
  document.getElementById('wpFill').style.width=p+'%';
  document.getElementById('wpLabel').textContent='Progreso semanal ('+dw+'/'+tw+')';
}
function updateDayRing(){
  const td=totalDayItems(person,day), dd=doneDayItems(person,day), p=pct(dd,td);
  const el=document.getElementById('dpPct');
  if(el)el.textContent=p+'%';
  const circ=document.getElementById('dpRingFill');
  if(circ){const r=16,circum=2*Math.PI*r;circ.style.strokeDasharray=circum;circ.style.strokeDashoffset=circum*(1-p/100);}
  const dat=dayData(person,day);
  const tEl=document.getElementById('dnowTitle'), fEl=document.getElementById('dnowFocus');
  if(tEl)tEl.textContent=dat.name+' · '+dat.title;
  if(fEl)fEl.textContent=dat.focus;
  updateSaveBtn();
}

function updateSaveBtn(){
  const btn=document.getElementById('saveDayBtn');
  if(!btn)return;
  if(isDaySaved(person,day)){
    btn.textContent='🔒 Guardado';
    btn.classList.add('saved');
  }else{
    btn.textContent='💾 Guardar';
    btn.classList.remove('saved');
  }
}

function toggleWU(kind,idx){ // kind: 'warmup' | 'cooldown'
  if(isDaySaved(person,day))return;
  const dd=dayDoneObj(person,day);
  dd[kind][idx]=!dd[kind][idx];
  const el=document.getElementById(kind+'-'+idx);
  if(el)el.classList.toggle('done',dd[kind][idx]);
  saveDone();updateWeekProg();updateDayRing();renderDayDots();
}

function toggleDone(idx){
  if(isDaySaved(person,day))return;
  const dd=dayDoneObj(person,day);
  dd.ex[idx]=!dd.ex[idx];
  const card=document.getElementById('exc-'+idx);
  const txt=document.getElementById('chktxt-'+idx);
  const isDone=dd.ex[idx];
  card.classList.toggle('done',isDone);
  txt.textContent=isDone?'¡Listo!':'Marcar completado';
  if(isDone && openDet.has(idx)){
    openDet.delete(idx);
    const det=document.getElementById('det-'+idx);
    const expbtn=document.getElementById('expbtn-'+idx);
    if(det)det.classList.remove('open');
    if(expbtn){expbtn.classList.remove('open');expbtn.querySelector('.btxt').textContent='Ver más';}
  }
  saveDone();updateWeekProg();updateDayRing();renderDayDots();
}

function toggleDet(idx){
  const det=document.getElementById('det-'+idx);
  const btn=document.getElementById('expbtn-'+idx);
  if(openDet.has(idx)){openDet.delete(idx);det.classList.remove('open');btn.classList.remove('open');btn.querySelector('.btxt').textContent='Ver más';}
  else{openDet.add(idx);det.classList.add('open');btn.classList.add('open');btn.querySelector('.btxt').textContent='Ocultar';}
}

function setPerson(p){
  person=p;day=0;openDet.clear();
  document.querySelectorAll('.ptab').forEach((t,i)=>t.classList.toggle('active',i===(p==='yo'?0:1)));
  renderDayTabs();renderContent();updateWeekProg();updateDayRing();
}
function setDay(d){
  day=d;openDet.clear();
  document.querySelectorAll('.dtab').forEach((t,i)=>t.classList.toggle('active',i===d));
  renderContent();updateDayRing();window.scrollTo({top:0,behavior:'smooth'});
}

function renderDayDots(){
  document.querySelectorAll('.dtab').forEach((t,i)=>{
    const existing=t.querySelector('.dtick');
    const allDone=doneDayItems(person,i)===totalDayItems(person,i)&&totalDayItems(person,i)>0;
    if(allDone&&!existing){const s=document.createElement('span');s.className='dtick';t.appendChild(s);}
    else if(!allDone&&existing){existing.remove();}
  });
}

function renderDayTabs(){
  document.getElementById('dayTabs').innerHTML=routines[person].days.map((d,i)=>{
    const lock=isDaySaved(person,i)?' 🔒':'';
    return `<button class="dtab${i===day?' active':''}" onclick="setDay(${i})">${d.short}${lock}</button>`;
  }).join('');
  renderDayDots();
}

function renderWUList(kind,items,dd){
  return items.map((it,i)=>{
    const isDone=!!dd[kind][i];
    return `<div class="item${isDone?' done':''}" id="${kind}-${i}">
      <span class="item-ico">${it.ico}</span>
      <div class="item-body"><div class="item-name">${it.name}</div><div class="item-sub">${it.sub}</div></div>
      <button class="item-chk" onclick="toggleWU('${kind}',${i})"><svg width="10" height="8" viewBox="0 0 11 9" fill="none"><polyline points="1,4.5 4,7.5 10,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>`;
  }).join('');
}

function renderContent(){
  const d=dayData(person,day);
  const dd=dayDoneObj(person,day);
  const locked=isDaySaved(person,day);

  let html=locked?`<div class="lockedbanner">🔒 Día guardado en tu historial. Para corregirlo, usa Reset semanal.</div>`:'';
  html+=`
  <div class="itemlist">
  ${renderWUList('warmup',d.warmup,dd)}
  </div>
  <div class="itemlist" style="margin-top:9px">`;

  d.exercises.forEach((ex,i)=>{
    const info=EX[ex.k]||{};
    const isDone=!!dd.ex[i];
    const stepsHTML=(info.pasos||[]).map((p,n)=>`<li data-n="${n+1}">${p}</li>`).join('');
    html+=`<div class="exc${isDone?' done':''}" id="exc-${i}">
      <div class="extop">
        <div class="exillo">${SVG[ex.img]||''}</div>
        <div class="exbody">
          <div class="exname">${i+1}. ${ex.name}</div>
          <div class="badges">
            <span class="badge bs">${ex.s}x</span>
            <span class="badge br">${ex.r}</span>
            <span class="badge bt">${ex.t}</span>
          </div>
        </div>
      </div>
      <div class="exrow2">
        <button class="expbtn" id="expbtn-${i}" onclick="toggleDet(${i})"><span class="btxt">Ver más</span><span class="arr">▾</span></button>
        <button class="chkbtn" id="chk-${i}" onclick="toggleDone(${i})">
          <div class="chk-circle"><svg width="10" height="8" viewBox="0 0 11 9" fill="none"><polyline points="1,4.5 4,7.5 10,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <span class="chk-txt" id="chktxt-${i}">${isDone?'¡Listo!':'Marcar completado'}</span>
        </button>
      </div>
      <div class="exdet" id="det-${i}">
        ${info.desc?`<div class="dsec"><div class="dlabel">Para qué sirve</div><div class="dtext">${info.desc}</div></div>`:''}
        ${info.pos?`<div class="dsec"><div class="dlabel">Cómo te colocas</div><div class="dtext">${info.pos}</div></div>`:''}
        ${stepsHTML?`<div class="dsec"><div class="dlabel">Pasos</div><ul class="dsteps">${stepsHTML}</ul></div>`:''}
        ${info.tip?`<div class="tipbox">💡 ${info.tip}</div>`:''}
      </div>
    </div>`;
  });

  html+=`</div><div class="itemlist" style="margin-top:9px">${renderWUList('cooldown',d.cooldown,dd)}</div>`;
  document.getElementById('content').innerHTML=html;
}

function resetSemana(){
  if(!confirm('¿Reiniciar todos los ítems completados de esta semana?'))return;
  done[person]=emptyDonePerson();
  savedDays[person]=[false,false,false,false,false];
  saveDone();saveSavedFlags();openDet.clear();renderDayTabs();renderContent();updateWeekProg();updateDayRing();
}

// ---- RESUMEN: lee el log histórico y arma texto ----
function parseKey(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
function isoWeekStart(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
function buildResumen(){
  const entries=log[person]||{};
  const keys=Object.keys(entries).sort();
  if(keys.length===0)return 'Aún no hay registros guardados para '+(person==='yo'?'ti':'tu pareja')+'.\n¡Marca tu primer ejercicio para empezar a generar historial!';

  const now=new Date();
  const todayK=todayKey();
  const wkStart=isoWeekStart(now);
  const monthPrefix=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');

  // Hoy
  const hoy=entries[todayK];
  const hoyTxt=hoy?`${hoy.done}/${hoy.total} (${pct(hoy.done,hoy.total)}%)`:'sin registro aún';

  // Semana actual (lun-dom)
  let semDone=0,semTotal=0,semDias=0;
  keys.forEach(k=>{
    const dt=parseKey(k);
    if(dt>=wkStart){semDone+=entries[k].done;semTotal+=entries[k].total;semDias++;}
  });
  const semPct=pct(semDone,semTotal);

  // Mes actual
  let mesDone=0,mesTotal=0,mesDias=0;
  const diasDelMes=[];
  keys.forEach(k=>{
    if(k.startsWith(monthPrefix)){
      mesDone+=entries[k].done;mesTotal+=entries[k].total;mesDias++;
      diasDelMes.push(k+': '+entries[k].done+'/'+entries[k].total);
    }
  });
  const mesPct=pct(mesDone,mesTotal);

  const nombre=person==='yo'?'Yo (Fútbol & Masa)':'Pareja (Tonificar)';
  const fechaHoy=now.toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'});

  let txt=`🏋️ RESUMEN DE ENTRENAMIENTO\n${nombre}\n${fechaHoy}\n\n`;
  txt+=`📅 HOY: ${hoyTxt}\n\n`;
  txt+=`📆 ESTA SEMANA (${semDias} día${semDias!==1?'s':''} entrenado${semDias!==1?'s':''}):\n${semDone}/${semTotal} ítems · ${semPct}% cumplimiento\n\n`;
  txt+=`🗓️ ESTE MES (${mesDias} día${mesDias!==1?'s':''} entrenado${mesDias!==1?'s':''}):\n${mesDone}/${mesTotal} ítems · ${mesPct}% cumplimiento\n`;
  return txt;
}

function showResumen(){
  document.getElementById('resumenBox').textContent=buildResumen();
  document.getElementById('modalBg').classList.add('open');
}
function closeResumen(){document.getElementById('modalBg').classList.remove('open');}
function copyResumen(){
  const txt=document.getElementById('resumenBox').textContent;
  const btn=document.getElementById('copyBtn');
  function ok(){btn.textContent='✓ Copiado';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copiar texto';btn.classList.remove('copied');},1800);}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok).catch(()=>{fallbackCopy(txt,ok);});
  }else{fallbackCopy(txt,ok);}
}
function fallbackCopy(txt,cb){
  const ta=document.createElement('textarea');
  ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');cb();}catch(e){}
  document.body.removeChild(ta);
}
